name: Authority Clarity Validator

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  authority-clarity-validator:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Authority Clarity validator tests
        env:
          PYTHONPATH: src
        run: python -m unittest tests.test_authority_clarity_gate_validation
